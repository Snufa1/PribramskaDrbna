<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>E-shop — Příbramská drbna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>

<header>
    <div class="container header-content">
        <div class="brand">
            <img id="logo" src="logo.png" alt="Logo">
            <h1>Příbramská drbna</h1>
        </div>
        <nav>
            <a href="index.html">Domovská stránka</a>
            <span class="nav-sep" aria-hidden="true"></span>
            <a class="shop-link" href="eshop.html">E-shop</a>
        </nav>
    </div>
</header>

<main>
    <section class="shop-section">
        <div class="container">
            <h3>E-shop — Merch</h3>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-image">Obrázek 1</div>
                    <h4>Tričko s logem</h4>
                    <div class="price">399 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image">Obrázek 2</div>
                    <h4>Mikina</h4>
                    <div class="price">899 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image">Obrázek 3</div>
                    <h4>Kšiltovka</h4>
                    <div class="price">249 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image">Obrázek 4</div>
                    <h4>Taška</h4>
                    <div class="price">199 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image">Obrázek 5</div>
                    <h4>Pohlednice (set)</h4>
                    <div class="price">129 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    © 2026 Příbramská drbna | Kontakt | Inzerce | O nás
</footer>

</body>
</html>
