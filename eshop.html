<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>E-shop — Příbramská drbna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>

<header>
    <div class="container2 header-content">
        <div class="brand">
            <img id="logo" src="logo.png" alt="Logo">
            <h1>Příbramská drbna</h1>
        </div>
        <nav>
            <a href="index.html">Magazín</a>
            <span class="nav-sep" aria-hidden="true"></span>
            <a class="shop-link" href="eshop.html">E-shop</a>
        </nav>
    </div>
</header>

<main>
    <section class="shop-section">
        <div class="container2">
            <h3>E-shop — Merch</h3>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="tríčo.png" alt=""></div>
                    <h4>Tričko s logem</h4>
                    <div class="price">399 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="mikča.png" alt=""></div>
                    <h4>Mikina</h4>
                    <div class="price">899 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="SPIMSVOJTOU.png" alt="obrazek"></div>
                    <h4>Polštář</h4>
                    <div class="price">249 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="taska.png" alt=""></div>
                    <h4>Taška</h4>
                    <div class="price">199 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="phoneCase.png" alt=""></div>
                    <h4>Kryt na telefon</h4>
                    <div class="price">499 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
                <div class="product-card">
                    <div class="product-image-box"><img class="product-image" src="flaska.png" alt=""></div>
                    <h4>Flashka</h4>
                    <div class="price">349 Kč</div>
                    <a class="buy-btn" href="#">Koupit</a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    © 2026 Příbramská drbna |
    <a href = "Kontakt.html" class = "kontaktBtn">Kontakt</a>
    |
    <a href = "O nás.html" class = "kontaktBtn">O nás</a>
</footer>


</body>
</html>
